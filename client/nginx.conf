# Docker Compose uses internal hostname, Render uses the public HTTPS URL.
# BACKEND_URL is injected at container startup by nginx-entrypoint.sh.
# Default fallback: http://backend:5000 (works for local Docker Compose)

server {
    listen 80;

    # Use Google's public DNS to resolve dynamic upstream hostnames (needed on Render)
    resolver 8.8.8.8 8.8.4.4 valid=30s;
    resolver_timeout 5s;

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        # Try to serve file, if not found fallback to index.html (for React Router)
        try_files $uri $uri/ /index.html;
    }

    # Proxy /api requests to the backend
    location /api/ {
        set $backend "${BACKEND_URL}";
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $proxy_host;
        proxy_cache_bypass $http_upgrade;
        # Required for proxying to HTTPS upstream on Render
        proxy_ssl_server_name on;
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
