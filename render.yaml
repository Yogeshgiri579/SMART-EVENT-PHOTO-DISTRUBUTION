# render.yaml — Render Blueprint
# Builds each service directly from its Dockerfile in the repo.
# Render reads this when you create New → Blueprint.

services:
  # ─── Backend (Node.js API) ───────────────────────────────────────────────
  - type: web
    name: momentdrop-backend
    runtime: docker
    dockerfilePath: ./server/Dockerfile
    dockerContext: ./server
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_ACCESS_EXPIRY
        value: 15m
      - key: JWT_REFRESH_EXPIRY
        value: 7d
      - key: MINIO_ENDPOINT
        sync: false
      - key: MINIO_BUCKET
        value: momentdrop
      - key: MINIO_ACCESS_KEY
        sync: false
      - key: MINIO_SECRET_KEY
        sync: false
      - key: MINIO_USE_SSL
        value: "true"
      - key: PYTHON_SERVICE_URL
        sync: false

  # ─── Background Worker ───────────────────────────────────────────────────
  - type: worker
    name: momentdrop-worker
    runtime: docker
    dockerfilePath: ./server/worker.Dockerfile
    dockerContext: ./server
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: REDIS_URL
        sync: false
      - key: MINIO_ENDPOINT
        sync: false
      - key: MINIO_BUCKET
        value: momentdrop
      - key: MINIO_ACCESS_KEY
        sync: false
      - key: MINIO_SECRET_KEY
        sync: false
      - key: MINIO_USE_SSL
        value: "true"
      - key: PYTHON_SERVICE_URL
        sync: false

  # ─── Python Face Recognition Service ────────────────────────────────────
  - type: web
    name: momentdrop-python
    runtime: docker
    dockerfilePath: ./python_service/Dockerfile
    dockerContext: ./python_service
    plan: free

  # ─── React Client (Nginx) ────────────────────────────────────────────────
  - type: web
    name: momentdrop-client
    runtime: docker
    dockerfilePath: ./client/Dockerfile
    dockerContext: ./client
    plan: free
    envVars:
      - key: BACKEND_URL
        sync: false

  # ─── Redis ───────────────────────────────────────────────────────────────
  - type: redis
    name: momentdrop-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []
