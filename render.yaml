# render.yaml — Render Blueprint
# Deploys all MomentDrop services using pre-built Docker Hub images.
# Render reads this file when you create a New → Blueprint.
#
# After services are created, set the secret env vars (sync: false)
# in each service's Environment tab in the Render dashboard.

services:
  # ─── Backend (Node.js API) ────────────────────────────────────────────────
  - type: web
    name: momentdrop-backend
    image:
      url: docker.io/yogeshgiri579/momentdrop-backend:latest
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_ACCESS_EXPIRY
        value: 15m
      - key: JWT_REFRESH_EXPIRY
        value: 7d
      - key: MINIO_ENDPOINT
        sync: false
      - key: MINIO_BUCKET
        value: momentdrop
      - key: MINIO_ACCESS_KEY
        sync: false
      - key: MINIO_SECRET_KEY
        sync: false
      - key: MINIO_USE_SSL
        value: "true"
      - key: PYTHON_SERVICE_URL
        sync: false

  # ─── Background Worker ───────────────────────────────────────────────────
  - type: worker
    name: momentdrop-worker
    image:
      url: docker.io/yogeshgiri579/momentdrop-backend:latest
    plan: free
    startCommand: npm run worker
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: REDIS_URL
        sync: false
      - key: MINIO_ENDPOINT
        sync: false
      - key: MINIO_BUCKET
        value: momentdrop
      - key: MINIO_ACCESS_KEY
        sync: false
      - key: MINIO_SECRET_KEY
        sync: false
      - key: MINIO_USE_SSL
        value: "true"
      - key: PYTHON_SERVICE_URL
        sync: false

  # ─── Python Face Recognition Service ─────────────────────────────────────
  - type: web
    name: momentdrop-python
    image:
      url: docker.io/yogeshgiri579/momentdrop-python:latest
    plan: free

  # ─── React Client (Nginx) ─────────────────────────────────────────────────
  - type: web
    name: momentdrop-client
    image:
      url: docker.io/yogeshgiri579/momentdrop-client:latest
    plan: free
    envVars:
      - key: BACKEND_URL
        sync: false

  # ─── Redis ────────────────────────────────────────────────────────────────
  - type: redis
    name: momentdrop-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []
