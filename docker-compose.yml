# MinIO for S3-compatible storage (free). Create bucket "momentdrop" in Console http://localhost:9001
services:
  mongodb:
    image: mongo:latest
    ports:
      - "27018:27017"
    volumes:
      - mongodb_data:/data/db

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  python_service:
    build: ./python_service
    ports:
      - "8000:8000"
    volumes:
      - ./python_service/.deepface:/app/.deepface
    environment:
      - PYTHONUNBUFFERED=1

  backend:
    build: ./server
    ports:
      - "5000:5000"
    env_file: ./server/.env
    depends_on:
      - mongodb
      - redis
      - minio
      - python_service
    environment:
      - NODE_ENV=development
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/momentdrop
      - REDIS_URL=redis://redis:6379
      - MINIO_ENDPOINT=http://minio:9000
      - PYTHON_SERVICE_URL=http://python_service:8000

  worker:
    build: ./server
    command: npm run worker
    env_file: ./server/.env
    depends_on:
      - mongodb
      - redis
      - minio
      - backend
      - python_service
    environment:
      - NODE_ENV=development
      - MONGO_URI=mongodb://mongodb:27017/momentdrop
      - REDIS_URL=redis://redis:6379
      - MINIO_ENDPOINT=http://minio:9000
      - PYTHON_SERVICE_URL=http://python_service:8000

  client:
    build: ./client
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  minio_data:
  mongodb_data:
