name: CI — Test, Build & Validate

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Test the Node.js backend
  # ─────────────────────────────────────────────
  test-backend:
    name: 🧪 Backend Tests (Vitest)
    runs-on: ubuntu-latest

    # Spin up a real MongoDB instance for the duration of this job
    services:
      mongodb:
        image: mongo:6
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: server/package-lock.json

      - name: Install backend dependencies
        run: npm ci
        working-directory: ./server

      - name: Run tests
        run: npm test
        working-directory: ./server
        env:
          NODE_ENV: test
          # Point tests at the MongoDB service container started above
          MONGODB_URI: mongodb://localhost:27017/momentdrop_test

  # ─────────────────────────────────────────────
  # Job 2: Build & validate the React client
  # ─────────────────────────────────────────────
  build-client:
    name: 🏗️ Client Build (Vite)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        run: npm ci
        working-directory: ./client

      - name: Build client
        run: npm run build
        working-directory: ./client
        env:
          # Vite build needs this to avoid interactive prompts
          CI: true

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-dist
          path: client/dist/
          retention-days: 7

  # ─────────────────────────────────────────────
  # Job 3: Validate backend + client Docker images
  # NOTE: Python image is NOT validated here —
  # deepface pulls ~200MB of ML model weights at
  # runtime (not build time) which would timeout
  # CI. The Python image is built & pushed in CD.
  # ─────────────────────────────────────────────
  validate-docker:
    name: 🐳 Docker Build Validation
    runs-on: ubuntu-latest
    needs: [test-backend, build-client]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image (validate only)
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: false
          tags: momentdrop-backend:ci

      - name: Build client image (validate only)
        uses: docker/build-push-action@v5
        with:
          context: ./client
          push: false
          tags: momentdrop-client:ci
