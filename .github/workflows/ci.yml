name: CI — Test, Build & Validate

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Test the Node.js backend
  # ─────────────────────────────────────────────
  test-backend:
    name: 🧪 Backend Tests (Vitest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: server/package-lock.json

      - name: Install backend dependencies
        run: npm ci
        working-directory: ./server

      - name: Run tests
        run: npm test
        working-directory: ./server
        env:
          # Tests that need MongoDB will use in-memory mocking from the test file
          NODE_ENV: test

  # ─────────────────────────────────────────────
  # Job 2: Build & validate the React client
  # ─────────────────────────────────────────────
  build-client:
    name: 🏗️ Client Build (Vite)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        run: npm ci
        working-directory: ./client

      - name: Build client
        run: npm run build
        working-directory: ./client
        env:
          # Vite build needs this to avoid interactive prompts
          CI: true

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-dist
          path: client/dist/
          retention-days: 7

  # ─────────────────────────────────────────────
  # Job 3: Validate all Docker images build correctly
  # Runs only after tests + client build pass
  # ─────────────────────────────────────────────
  validate-docker:
    name: 🐳 Docker Build Validation
    runs-on: ubuntu-latest
    needs: [test-backend, build-client]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image (validate only)
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: false
          tags: momentdrop-backend:ci

      - name: Build client image (validate only)
        uses: docker/build-push-action@v5
        with:
          context: ./client
          push: false
          tags: momentdrop-client:ci

      - name: Build python_service image (validate only)
        uses: docker/build-push-action@v5
        with:
          context: ./python_service
          push: false
          tags: momentdrop-python:ci
