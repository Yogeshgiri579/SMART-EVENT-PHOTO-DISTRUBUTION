name: CD — Build & Push Docker Images

on:
  push:
    branches: ["main"]

jobs:
  # ─────────────────────────────────────────────
  # Build & push all 3 service images to Docker Hub
  # Only runs when code is merged/pushed to main
  # ─────────────────────────────────────────────
  push-images:
    name: 🚀 Push to Docker Hub
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── Backend ──────────────────────────────
      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/momentdrop-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/momentdrop-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Client ───────────────────────────────
      - name: Build & push client image
        uses: docker/build-push-action@v5
        with:
          context: ./client
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/momentdrop-client:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/momentdrop-client:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Python Service ───────────────────────
      - name: Build & push python_service image
        uses: docker/build-push-action@v5
        with:
          context: ./python_service
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/momentdrop-python:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/momentdrop-python:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Summary ──────────────────────────────
      - name: Deployment summary
        run: |
          echo "## ✅ Docker Images Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Image Tag |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-----------|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend | \`${{ secrets.DOCKERHUB_USERNAME }}/momentdrop-backend:${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Client  | \`${{ secrets.DOCKERHUB_USERNAME }}/momentdrop-client:${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Python  | \`${{ secrets.DOCKERHUB_USERNAME }}/momentdrop-python:${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY

      # ── Trigger Render deploys ────────────────
      # Each hook URL tells Render to pull the new :latest image and redeploy.
      # Add these secrets in: GitHub repo → Settings → Secrets → Actions
      # Get the hook URLs from: Render dashboard → service → Settings → Deploy Hook
      - name: 🚀 Trigger Render auto-deploys
        run: |
          echo "Triggering Render deploys..."
          curl -s -o /dev/null -w "Backend: %{http_code}\n" \
            -X POST "${{ secrets.RENDER_DEPLOY_HOOK_BACKEND }}"
          curl -s -o /dev/null -w "Worker:  %{http_code}\n" \
            -X POST "${{ secrets.RENDER_DEPLOY_HOOK_WORKER }}"
          curl -s -o /dev/null -w "Python:  %{http_code}\n" \
            -X POST "${{ secrets.RENDER_DEPLOY_HOOK_PYTHON }}"
          curl -s -o /dev/null -w "Client:  %{http_code}\n" \
            -X POST "${{ secrets.RENDER_DEPLOY_HOOK_CLIENT }}"
          echo "✅ Deploy hooks triggered. Check Render dashboard for status."

